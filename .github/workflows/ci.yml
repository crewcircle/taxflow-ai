name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      # The deploy gate (tests/integration/test_deploy_gate.py) and the migration
      # runner self-test (tests/integration/test_apply_migrations.py) apply ALL
      # migrations to this Postgres service, so schema drift / a broken migration
      # fails CI here before deploy-backend can run.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: taxflow_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # psql client for the migration runner self-test (test_apply_migrations.py
      # shells out to scripts/apply_migrations.sh, which calls psql).
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        working-directory: apps/backend
        run: uv sync --extra dev

      # This step now also runs the migrate + read-path deploy gate
      # (tests/integration/test_deploy_gate.py) and the shell runner self-test
      # (tests/integration/test_apply_migrations.py) against the postgres service.
      - name: Run backend tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/taxflow_test
          ENVIRONMENT: test
        run: uv run pytest tests/ -v --tb=short

  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - name: Typecheck dashboard
        working-directory: apps/dashboard
        run: pnpm typecheck
      - name: Lint dashboard
        working-directory: apps/dashboard
        run: pnpm lint
      - name: Unit test dashboard
        working-directory: apps/dashboard
        run: pnpm test:unit

  deploy-dashboard:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-dashboard]
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: pnpm add -g vercel
      # Remote build on Vercel: the dashboard's package.json is self-contained
      # (no workspace: refs), so deploying the app directory alone works and
      # avoids pnpm-workspace path issues with --prebuilt.
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN
        working-directory: apps/dashboard

  deploy-backend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # test-backend now includes the migrate + read-path deploy gate
    # (tests/integration/test_deploy_gate.py) and the runner self-test
    # (tests/integration/test_apply_migrations.py), so a schema-drift / broken
    # migration fails this pipeline before it can deploy.
    needs: [test-backend, test-dashboard]
    runs-on: ubuntu-latest
    # Serialize deploys to main: a session advisory lock in apply_migrations.sh is
    # the real guard against overlapping migration runs, but this concurrency group
    # stops CI from starting two deploy-backend jobs at once as belt-and-suspenders.
    concurrency:
      group: deploy-backend-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DROPLET_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Doppler CLI
        run: (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh) | sudo sh

      # psql client for scripts/apply_migrations.sh, which deploy_backend.sh runs on
      # this GitHub runner (against MIGRATION_DATABASE_URL) before building/deploying.
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Deploy backend to droplet
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        # deploy_backend.sh is the deploy gate: it applies pending DB migrations
        # (schema before code), then builds a sha-tagged image, runs a post-deploy
        # /health smoke test, and rolls back to the previous tag + exits non-zero on
        # failure, so this job goes red on a bad deploy (Decision #2487).
        # MIGRATION_DATABASE_URL (Supabase session pooler, port 5432) comes from the
        # taxflow/prd Doppler config alongside the other required vars.
        run: doppler run --project taxflow --config prd -- bash scripts/deploy_backend.sh
