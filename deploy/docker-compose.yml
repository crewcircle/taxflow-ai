services:
  backend:
    build:
      context: ../apps/backend
    restart: unless-stopped
    env_file: /opt/taxflow/.env
    # 2 workers on the 4GB RAM / 2 vCPU droplet (one per vCPU); matches the Dockerfile CMD.
    # NOTE: keep the DB pool (POOL_MAX_CONN, Task A1) sized so 2 workers together stay under Supabase's connection limit.
    command: ["uv", "run", "uvicorn", "taxflow.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
